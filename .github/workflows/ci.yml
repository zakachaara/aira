  release:
    name: Cross-compile release binaries
    runs-on: ubuntu-latest
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build release binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X 'github.com/zakachaara/aira/cmd/aira.Version=${VERSION}' \
                          -X 'github.com/zakachaara/aira/cmd/aira.GitCommit=${COMMIT}' \
                          -X 'github.com/zakachaara/aira/cmd/aira.BuildDate=${DATE}'"

          mkdir -p dist
          CGO_ENABLED=1 GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" -o dist/aira-linux-amd64   ./cmd/aira
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" -o dist/aira-darwin-amd64  ./cmd/aira
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -trimpath -ldflags "$LDFLAGS" -o dist/aira-darwin-arm64  ./cmd/aira
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" -o dist/aira-windows-amd64.exe ./cmd/aira
          ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
