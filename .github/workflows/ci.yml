  build-binaries:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    needs: [test]
    #if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            output: aira-linux-amd64
          - os: macos-latest
            arch: amd64
            output: aira-darwin-amd64
          - os: macos-latest
            arch: arm64
            output: aira-darwin-arm64
          - os: windows-latest
            arch: amd64
            output: aira-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build binary
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X 'github.com/zakachaara/aira/cmd/aira.Version=${VERSION}' \
                          -X 'github.com/zakachaara/aira/cmd/aira.GitCommit=${COMMIT}' \
                          -X 'github.com/zakachaara/aira/cmd/aira.BuildDate=${DATE}'"
          mkdir -p dist
          CGO_ENABLED=1 GOOS=${{ matrix.os == 'windows-latest' && 'windows' || (matrix.os == 'macos-latest' && 'darwin' || 'linux') }} \
          GOARCH=${{ matrix.arch }} \
          go build -trimpath -ldflags "$LDFLAGS" -o dist/${{ matrix.output }} ./cmd/aira

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-binaries]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List files
        run: ls -lh dist/*/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*/*
