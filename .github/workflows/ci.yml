name: CI

on:
  push:
    branches: 
      - test-release-workflow #[main, develop]#pull_request:#  branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.22']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test (with race detector)
        run: CGO_ENABLED=1 go test -race -count=1 -timeout=120s ./...

      - name: Build binary
        run: CGO_ENABLED=1 go build -trimpath -o aira ./cmd/aira

