name: CI

on:
  push:
    branches: 
      - test-release-workflow
    tags:
      - 'v*'

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.22']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test (with race detector)
        run: CGO_ENABLED=1 go test -race -count=1 -timeout=120s ./...

      - name: Build binary
        run: CGO_ENABLED=1 go build -trimpath -o aira ./cmd/aira

  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [test]
    #if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            arch: amd64
            target: aira-linux-amd64
          - os: macos-latest
            goos: darwin
            arch: amd64
            target: aira-darwin-amd64
          - os: macos-latest
            goos: darwin
            arch: arm64
            target: aira-darwin-arm64
          - os: windows-latest
            goos: windows
            arch: amd64
            target: aira-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build binary
        shell: ${{ matrix.shell }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X 'github.com/zakachaara/aira/cmd/aira.Version=${VERSION}' \
                          -X 'github.com/zakachaara/aira/cmd/aira.GitCommit=${COMMIT}' \
                          -X 'github.com/zakachaara/aira/cmd/aira.BuildDate=${DATE}'"
          mkdir -p dist
          CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.arch }} \
            go build -trimpath -ldflags "$LDFLAGS" -o dist/${{ matrix.target }} ./cmd/aira

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.target }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-binaries]
    #if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Move files to release directory
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \;
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
