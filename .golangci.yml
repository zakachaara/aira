run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - gofmt
    - goimports
    - govet
    - staticcheck
    - errcheck
    - revive
    - gosimple
    - ineffassign
    - unused
    - bodyclose
    - contextcheck
    - dupl
    - gocritic
    - noctx
    - predeclared
    - unconvert
    - unparam

  disable:
    - depguard
    - exhaustruct
    - gochecknoglobals   # cobra uses package-level vars
    - wrapcheck          # too noisy for a CLI tool

linters-settings:
  goimports:
    local-prefixes: github.com/zakachaara/aira

  revive:
    rules:
      - name: exported
        severity: warning
      - name: unused-parameter
        severity: warning
      - name: var-naming
        severity: warning

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - commentedOutCode
      - hugeParam

issues:
  exclude-rules:
    # Test files can have more relaxed rules
    - path: _test\.go
      linters:
        - dupl
        - errcheck
        - unparam

    # cmd package uses cobra idioms that trigger some linters
    - path: cmd/aira/
      linters:
        - gochecknoglobals
